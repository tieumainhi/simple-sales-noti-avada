query InitialOrders($limit: Int!) {
  orders(first: $limit, sortKey: CREATED_AT, reverse: true) {
    edges {
      node {
        id
        legacyResourceId
        name
        createdAt
        processedAt
        customer {
          firstName
        }
        billingAddress {
          firstName
          city
          country
        }
        shippingAddress {
          city
          country
        }
        lineItems(first: 1) {
          edges {
            node {
              title
              product {
                legacyResourceId
                featuredImage {
                  url
                }
              }
              variant {
                image {
                  url
                }
              }
            }
          }
        }
      }
    }
  }
}
